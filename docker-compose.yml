services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx prisma migrate deploy
    restart: "no"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      NODE_ENV: development
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx tsx watch server/index.ts
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    env_file:
      - path: .env.local
        required: false
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx tsx watch worker/index.ts
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/postgres
      REDIS_URL: redis://redis:6379
      NODE_ENV: development
    env_file:
      - path: .env.local
        required: false
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    command: npx vite --host 0.0.0.0
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      VITE_USE_POLL: "true"
      API_URL: http://server:3001
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    depends_on:
      - server

volumes:
  postgres_data:
  redis_data:
  node_modules:
